plugins {
    id("com.android.application")
    id("org.jetbrains.kotlin.android")
//    id("com.google.gms.google-services")
    id("kotlinx-serialization")
}



android {
    ndkVersion "29.0.14206865"

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }
    // Ensure Kotlin targets Java 17 bytecode explicitly.
    // Without this, newer JDK toolchains (e.g., 21) can be inferred
    // and older Kotlin plugins will fail with "Unknown Kotlin JVM target: 21".
    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_17.toString()
    }
    compileSdk 35
    defaultConfig {
        applicationId 'io.geph.android'
        minSdk 21
        targetSdk 35
        versionCode 11220
        versionName '5.6.0'
        testInstrumentationRunner 'androidx.test.runner.AndroidJUnitRunner'
        ndk {
            abiFilters 'armeabi-v7a', 'arm64-v8a'
        }
    }


    buildTypes {
        releaseAPK {
            minifyEnabled false
            shrinkResources false
            debuggable false
            signingConfig signingConfigs.debug
        }

        releasePlay {
            minifyEnabled false
            shrinkResources false
            debuggable false
        }

        debug {
            debuggable true
            applicationIdSuffix ".debug"
            versionNameSuffix "-DEBUG"
        }
    }
    externalNativeBuild {
        ndkBuild {
            path 'jni/Android.mk'
        }
    }
    productFlavors {
    }
    namespace 'io.geph.android'
    lint {
        abortOnError false
        checkReleaseBuilds false
    }
    buildFeatures {
        buildConfig true
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation 'androidx.appcompat:appcompat:1.7.1'
    implementation 'com.google.android.material:material:1.13.0'
    implementation 'androidx.recyclerview:recyclerview:1.4.0'
    implementation 'com.squareup.retrofit2:retrofit:2.9.0'
    implementation 'com.squareup.retrofit2:converter-gson:2.9.0'
    implementation 'com.google.code.gson:gson:2.13.2'
    implementation 'com.android.volley:volley:1.2.1'
    implementation 'com.vdurmont:semver4j:3.1.0'
    implementation 'androidx.constraintlayout:constraintlayout:2.2.1'
    implementation files('jna-5.9.0.aar')
    implementation 'org.apache.commons:commons-text:1.15.0'
    implementation "androidx.webkit:webkit:1.12.1"
    implementation(platform("com.google.firebase:firebase-bom:32.7.1"))
    implementation "com.google.firebase:firebase-analytics"
    implementation "org.jetbrains.kotlinx:kotlinx-serialization-json:1.6.3"
    implementation 'androidx.browser:browser:1.8.0'
    implementation 'com.frybits.harmony:harmony:1.1.6'
}

task preBuildScript(type: Exec) {
    commandLine "bash", "PREBUILD.sh"
    workingDir rootProject.projectDir
}

task copyGephBinaries(type: Copy) {
    description = 'Copying geph binaries from the prebuild directory'
    from '../prebuild/'
    into 'src/main/jniLibs'
}

preBuild.dependsOn copyGephBinaries
copyGephBinaries.dependsOn preBuildScript
